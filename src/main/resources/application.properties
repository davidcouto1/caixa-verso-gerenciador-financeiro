# Configuração da Aplicação
quarkus.application.name=Simulador de Financiamentos
quarkus.http.port=8080

# Configuração do Datasource H2 (File-based)
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:file:./data/simulador-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# Hibernate - usando as propriedades nativas do Hibernate/JPA
quarkus.hibernate-orm.dialect=org.hibernate.dialect.H2Dialect
quarkus.hibernate-orm.log.sql=false
# Schema generation usando propriedade JPA padrão
jakarta.persistence.schema-generation.database.action=drop-and-create

# OpenAPI/Swagger
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# Logging
quarkus.log.level=INFO
quarkus.log.category."br.com.david.desafio".level=DEBUG

# Banner
quarkus.banner.enabled=true
