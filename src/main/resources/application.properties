# Configuração da Aplicação
quarkus.application.name=Simulador de Financiamentos
quarkus.http.port=8080

# Configuração do Datasource H2 (File-based)
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:file:./data/simulador-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# Hibernate - usando as propriedades nativas do Hibernate/JPA
quarkus.hibernate-orm.dialect=org.hibernate.dialect.H2Dialect
quarkus.hibernate-orm.log.sql=false
# Schema generation usando propriedade JPA padrão
jakarta.persistence.schema-generation.database.action=drop-and-create

# OpenAPI/Swagger
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
# Configuração de UI do Swagger
quarkus.swagger-ui.title=Simulador de Financiamentos API
quarkus.swagger-ui.theme=flattop
# Escanear o pacote da aplicação para incluir DTOs e schemas
mp.openapi.scan.packages=br.com.david.desafio
# Excluir endpoints de health, metrics e redirect do Swagger
mp.openapi.scan.exclude.classes=br.com.david.desafio.RedirectResource
mp.openapi.scan.exclude.packages=io.quarkus.smallrye.health,io.micrometer

# MicroProfile Health
quarkus.smallrye-health.root-path=/q/health
quarkus.smallrye-health.liveness-path=/q/health/live
quarkus.smallrye-health.readiness-path=/q/health/ready

# MicroProfile Metrics - Prometheus
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# Configurações customizadas do Simulador
simulador.calculo.scale.monetario=2
simulador.calculo.scale.intermediario=10
simulador.prazo.maximo.meses=360

# Logging
quarkus.log.level=INFO
quarkus.log.category."br.com.david.desafio".level=DEBUG

# Banner
quarkus.banner.enabled=true

# Continuous Testing - Desabilitado para não compilar testes no dev mode
quarkus.test.continuous-testing=disabled

# Servir arquivos estáticos do relatório Jacoco
quarkus.http.enable-compression=true

# JaCoCo Configuration - Exclusões de cobertura
quarkus.jacoco.excludes=br/com/david/desafio/dto/**,br/com/david/desafio/entity/**,br/com/david/desafio/config/**,br/com/david/desafio/exception/**,br/com/david/desafio/builder/**,br/com/david/desafio/strategy/JurosSimplesStrategy.class
quarkus.jacoco.report-location=target/site/jacoco
quarkus.jacoco.data-file=target/jacoco-quarkus.exec
